apiVersion: v1
data:
  config.yaml: |
    issuer: https://kubeflow.ubilink.ai/dex
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    logger:
      level: "debug"
      format: text
    oauth2:
      skipApprovalScreen: true

    connectors:
    # Auth Proxy connector - 驗證 MySQL bcrypt 密碼（唯一啟用的 connector）
    - type: oidc
      id: auth-proxy
      name: Billing Auth
      config:
        issuer: http://10.2.2.107:30180
        clientID: kubeflow-auth-proxy
        clientSecret: change-this-secret-key-in-production
        redirectURI: https://kubeflow.ubilink.ai/dex/callback
        insecureSkipEmailVerified: true
        insecureEnableGroups: false
        insecureSkipVerify: true
        scopes:
        - openid
        - profile
        - email

    # Authentik connector（已禁用 - 避免登出時重定向到 Authentik）
    # - type: oidc
    #   id: authentik
    #   name: Authentik
    #   config:
    #     issuer: https://authentik.ubilink.ai/application/o/kubeflow-dex/
    #     clientID: hxl26gPgWU1qQQmKzFWVroYZePKcbw4auph3w05Z
    #     clientSecret: 9gRbUNVcX95HFSFsfuxqzCMI07pSzCKVQDci4LOThVdTElwdd1WC6asaC9BcWkiUZFaLr7afU9M2MM1ADdmfboE8NoBTV60SIswCXx4IhNGZiF04jufU57nw8EBvgUyM
    #     redirectURI: https://kubeflow.ubilink.ai/dex/callback
    #     insecureSkipEmailVerified: true
    #     insecureEnableGroups: true
    #     insecureSkipVerify: true
    #     scopes:
    #     - openid
    #     - profile
    #     - email
    #     - groups

    # 注意：不再需要 LDAP connector
    # Auth Proxy 已經從 LDAP 查詢用戶信息並在 OIDC token 中返回
    # 如果需要組信息，Auth Proxy 會從 LDAP 查詢並包含在 userinfo 響應中

    staticClients:
    - idEnv: OIDC_CLIENT_ID
      redirectURIs: ["/oauth2/callback"]
      name: "Dex Login Application"
      secretEnv: OIDC_CLIENT_SECRET
      public: false
kind: ConfigMap
