apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: auth
  labels:
    app: openldap
spec:
  type: ClusterIP
  ports:
  - name: ldap
    port: 389
    targetPort: 1389
  - name: ldaps
    port: 636
    targetPort: 1636
  selector:
    app: openldap
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openldap
  namespace: auth
  labels:
    app: openldap
spec:
  serviceName: openldap
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: openldap
        image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/bitnami/openldap:2.6.8
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1001
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: LDAP_ADMIN_USERNAME
          value: "admin"
        - name: LDAP_ADMIN_PASSWORD
          value: "admin123"
        - name: LDAP_ROOT
          value: "dc=ubilink,dc=ai"
        - name: LDAP_USERS
          value: ""
        - name: LDAP_PASSWORDS
          value: ""
        ports:
        - name: ldap
          containerPort: 1389
        - name: ldaps
          containerPort: 1636
        volumeMounts:
        - name: ldap-data
          mountPath: /bitnami/openldap/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  volumeClaimTemplates:
  - metadata:
      name: ldap-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi

