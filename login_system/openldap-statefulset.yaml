apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: auth
  labels:
    app: openldap
spec:
  type: ClusterIP
  ports:
  - name: ldap
    port: 389
    targetPort: 389
  - name: ldaps
    port: 636
    targetPort: 636
  selector:
    app: openldap
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openldap
  namespace: auth
  labels:
    app: openldap
spec:
  serviceName: openldap
  replicas: 1
  selector:
    matchLabels:
      app: openldap
  template:
    metadata:
      labels:
        app: openldap
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: openldap
        image: osixia/openldap:1.5.0
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: LDAP_ORGANISATION
          value: "Ubilink"
        - name: LDAP_DOMAIN
          value: "ubilink.ai"
        - name: LDAP_ADMIN_PASSWORD
          value: "admin123"
        - name: LDAP_CONFIG_PASSWORD
          value: "config123"
        - name: LDAP_READONLY_USER
          value: "false"
        - name: LDAP_RFC2307BIS_SCHEMA
          value: "false"
        - name: LDAP_BACKEND
          value: "mdb"
        - name: LDAP_TLS
          value: "false"
        - name: LDAP_REMOVE_CONFIG_AFTER_SETUP
          value: "false"
        ports:
        - name: ldap
          containerPort: 389
        - name: ldaps
          containerPort: 636
        volumeMounts:
        - name: ldap-data
          mountPath: /var/lib/ldap
        - name: ldap-config
          mountPath: /etc/ldap/slapd.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - ldapsearch
            - -x
            - -H
            - ldap://localhost:389
            - -b
            - dc=ubilink,dc=ai
            - -D
            - cn=admin,dc=ubilink,dc=ai
            - -w
            - admin123
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - ldapsearch
            - -x
            - -H
            - ldap://localhost:389
            - -b
            - dc=ubilink,dc=ai
            - -D
            - cn=admin,dc=ubilink,dc=ai
            - -w
            - admin123
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: ldap-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
  - metadata:
      name: ldap-config
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 100Mi

