apiVersion: v1
kind: Service
metadata:
  name: openldap
  namespace: auth
  labels:
    app: openldap
spec:
  type: ClusterIP
  ports:
  - port: 389
    targetPort: 389
    protocol: TCP
    name: ldap
  - port: 636
    targetPort: 636
    protocol: TCP
    name: ldaps
---
apiVersion: v1
kind: Endpoints
metadata:
  name: openldap
  namespace: auth
subsets:
- addresses:
  # 使用 Kubernetes 內部 IP (10.2.2.108)，OpenLDAP 運行在 hgpn108 節點的 Docker 容器中
  - ip: 10.2.2.108
  ports:
  - port: 389
    name: ldap
    protocol: TCP
  - port: 636
    name: ldaps
    protocol: TCP

