apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-proxy
  namespace: auth
  labels:
    app: auth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-proxy
  template:
    metadata:
      labels:
        app: auth-proxy
    spec:
      containers:
      - name: auth-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MYSQL_HOST
          value: "10.2.240.11"
        - name: MYSQL_PORT
          value: "3306"
        - name: MYSQL_DB
          value: "auth"
        - name: MYSQL_USER
          value: "usagereportdb"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-auth-secret
              key: password
        - name: OIDC_CLIENT_ID
          value: "kubeflow-auth-proxy"
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-proxy-secret
              key: client-secret
        - name: OIDC_ISSUER
          value: "https://auth-proxy.ubilink.ai"
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-proxy-secret
              key: flask-secret-key
        - name: LDAP_SERVER
          value: "openldap.auth.svc.cluster.local"
        - name: LDAP_PORT
          value: "389"
        - name: LDAP_BASE_DN
          value: "dc=ubilink,dc=ai"
        - name: LDAP_ADMIN_DN
          value: "cn=admin,dc=ubilink,dc=ai"
        - name: LDAP_ADMIN_PASSWORD
          value: "admin123"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-proxy
  namespace: auth
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: auth-proxy
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-proxy-secret
  namespace: auth
type: Opaque
stringData:
  client-secret: "change-this-secret-key-in-production"
  flask-secret-key: "change-this-flask-secret-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-auth-secret
  namespace: auth
type: Opaque
stringData:
  password: "1@2Ma89t}yMz75kj"

