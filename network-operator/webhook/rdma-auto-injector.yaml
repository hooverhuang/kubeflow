apiVersion: v1
kind: ServiceAccount
metadata:
  name: rdma-auto-injector
  namespace: nvidia-network-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rdma-auto-injector
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "create", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rdma-auto-injector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rdma-auto-injector
subjects:
- kind: ServiceAccount
  name: rdma-auto-injector
  namespace: nvidia-network-operator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rdma-injector-config
  namespace: nvidia-network-operator
data:
  config.yaml: |
    # RDMA 自動注入配置
    rdmaResourceName: "rdma/rdma_shared_device_a"
    rdmaResourceValue: "1"
    configMapName: "nccl-rdma-env"
    configMapNamespace: "default"
    # 需要注入的命名空間（空表示所有命名空間）
    targetNamespaces: []
    # 排除的命名空間
    excludeNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - istio-system
      - nvidia-network-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdma-auto-injector
  namespace: nvidia-network-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rdma-auto-injector
  template:
    metadata:
      labels:
        app: rdma-auto-injector
    spec:
      serviceAccountName: rdma-auto-injector
      containers:
      - name: webhook
        image: python:3.11-slim
        command: ["/bin/bash", "-c", "pip install -q pyyaml && python /app/webhook.py"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        ports:
        - containerPort: 8443
          name: webhook
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook/certs
          readOnly: true
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: webhook-script
          mountPath: /app/webhook.py
          subPath: webhook.py
        env:
        - name: WEBHOOK_PORT
          value: "8443"
        - name: TLS_CERT_PATH
          value: "/etc/webhook/certs/tls.crt"
        - name: TLS_KEY_PATH
          value: "/etc/webhook/certs/tls.key"
      volumes:
      - name: webhook-certs
        secret:
          secretName: rdma-injector-certs
      - name: config
        configMap:
          name: rdma-injector-config
      - name: webhook-script
        configMap:
          name: rdma-injector-script
---
apiVersion: v1
kind: Service
metadata:
  name: rdma-auto-injector
  namespace: nvidia-network-operator
spec:
  ports:
  - port: 443
    targetPort: 8443
  selector:
    app: rdma-auto-injector
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: rdma-auto-injector
webhooks:
- name: rdma-injector.kubeflow.org
  clientConfig:
    service:
      name: rdma-auto-injector
      namespace: nvidia-network-operator
      path: "/mutate"
    caBundle: ""  # 將由部署腳本自動填充
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
  admissionReviewVersions: ["v1", "v1beta1"]
  sideEffects: None
  failurePolicy: Fail
  namespaceSelector:
    matchExpressions:
    - key: name
      operator: NotIn
      values:
      - nvidia-network-operator
    - key: kubernetes.io/metadata.name
      operator: NotIn
      values:
      - nvidia-network-operator

