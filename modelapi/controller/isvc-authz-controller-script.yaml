apiVersion: v1
kind: ConfigMap
metadata:
  name: isvc-authz-controller-script
  namespace: kubeflow
data:
  controller.sh: |
    #!/bin/bash
    set -euo pipefail

    CONTROLLER_NAME="isvc-authz-controller"

    echo "🚀 InferenceService AuthorizationPolicy Controller 启动..."
    echo "📡 监控所有 namespace 的 InferenceService"
    echo ""

    # 主循环，每 10 秒检查一次
    while true; do
      # 获取所有有 InferenceService 的 namespace
      namespaces=$(kubectl get inferenceservices --all-namespaces -o json 2>/dev/null | \
        jq -r '.items[].metadata.namespace' 2>/dev/null | sort -u)

      if [[ -z "$namespaces" ]]; then
        sleep 10
        continue
      fi

      for ns in $namespaces; do
        # 跳过系统 namespace
        if [[ "$ns" == "kube-system" || "$ns" == "kube-public" || "$ns" == "kube-node-lease" || \
              "$ns" == "knative-serving" || "$ns" == "knative-eventing" || "$ns" == "istio-system" || \
              "$ns" == "kubeflow" || "$ns" == "nvidia-network-operator" ]]; then
          continue
        fi

        authz_name="allow-all-inferenceservice-${ns}"
        
        # 检查是否已存在
        if ! kubectl get authorizationpolicy "$authz_name" -n "$ns" &>/dev/null; then
          echo "[$(date +%H:%M:%S)] 🔒 创建 AuthorizationPolicy: $ns/$authz_name"
          
          cat <<AUTHZ_EOF | kubectl apply -f -
    apiVersion: security.istio.io/v1beta1
    kind: AuthorizationPolicy
    metadata:
      name: $authz_name
      namespace: $ns
      labels:
        auto-created: "true"
        controller: isvc-authz-controller
    spec:
      selector:
        matchLabels:
          component: predictor
      action: ALLOW
      rules:
      - {}
    AUTHZ_EOF
          
          if [[ $? -eq 0 ]]; then
            echo "  ✅ AuthorizationPolicy 已创建"
          else
            echo "  ❌ 创建失败"
          fi
        fi
      done
      
      sleep 10
    done
